<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A1: Interactive Visualization 2017 US Weather with D3.js by Jiho Lee and John Li</title>
    <link rel="stylesheet" href="css/styles.css">

<body>
    <header>
        <h1>A1: Interactive Visualization 2017 US Weather with D3.js by Jiho Lee and John Li</h1>
        <p>Explore average temperatures, precipitation, and elevation across US cities and airports.</p>
    </header>

    <div class="dashboard">
        <aside class="controls">
            <h3>Display Variable</h3>
            <label><input type="radio" name="metric" value="temp" checked> Average Temp</label><br>
            <label><input type="radio" name="metric" value="prcp"> Total Precipitation</label><br>
            <label><input type="radio" name="metric" value="elevation"> Elevation</label><br>
        </aside>

        <main class="map-container" id="map-view">
            </main>

        <section class="chart-container" id="chart-view">
            </section>
    </div>

    <section class="writeup">
        <h2>Project Write-up</h2>
        </section>
